<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yoink — Clip</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #eee;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 14px;
  }
  h1 { font-size: 1.4rem; letter-spacing: 2px; color: #7cf; }
  video {
    max-width: 100%;
    width: 900px;
    background: #000;
    border: 1px solid #333;
    border-radius: 4px;
  }
  .meta {
    width: 900px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .saved-path {
    color: #6d6;
    font-size: 0.85rem;
    flex: 1;
    word-break: break-all;
  }
  .actions {
    width: 900px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  button {
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 7px 16px;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.9rem;
    transition: background 0.1s;
  }
  button:hover { background: #3a3a3a; }
  button.danger {
    background: #5a1a1a;
    border-color: #af3a3a;
    color: #fff;
  }
  button.danger:hover { background: #7a1e1e; }
  #msg {
    color: #aaa;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<h1>⬇ YOINK — clip</h1>

<video id="clip" src="/clip_video" controls autoplay></video>

<div class="meta">
  <span class="saved-path" id="savedPath">Loading…</span>
</div>

<div class="actions">
  <button id="backBtn">&#8592; Edit another clip</button>
  <button id="closeBtn" class="danger">Close app</button>
  <span id="msg"></span>
</div>

<script>
  fetch('/clip_info')
    .then(r => {
      if (!r.ok) throw new Error('No clip info');
      return r.json();
    })
    .then(info => {
      document.getElementById('savedPath').textContent = `Saved: ${info.saved_to}`;
    })
    .catch(() => {
      document.getElementById('savedPath').textContent = '';
    });

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = '/';
  });

  document.getElementById('closeBtn').addEventListener('click', async () => {
    const msg = document.getElementById('msg');
    msg.textContent = 'Shutting down…';
    await fetch('/shutdown', { method: 'POST' }).catch(() => {});
    document.body.innerHTML = '<p style="color:#555;font-family:monospace;padding:40px">Server stopped. You can close this tab.</p>';
  });
</script>
</body>
</html>
